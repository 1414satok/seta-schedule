<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SETA 2026 Schedule</title>
<style>
:root {
  --primary:#1a3a6b; --accent:#e8612c; --keynote:#7b2d8b; --plenary:#1a6b4a;
  --bg:#f0f0f5; --card:#fff; --border:#d1d1d6; --text:#1c1c1e; --sub:#6c6c70;
  --r1:#1a3a6b; --r2:#1a6b8a; --r3:#1a7a3a; --r6:#8a5a00; --r7:#8a1a2e;
  --green:#34c759;
  --st: env(safe-area-inset-top,0px);
  --sb: env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;height:100dvh;
}

/* Header */
.app-hdr{
  background:var(--primary);color:white;flex-shrink:0;
  padding:calc(10px + var(--st)) 16px 8px;
  box-shadow:0 1px 4px rgba(0,0,0,.3);
}
.app-hdr h1{font-size:19px;font-weight:700;letter-spacing:-.3px;}
.app-hdr p{font-size:11px;opacity:.75;margin-top:2px;}

/* Day tabs */
.day-tabs{
  display:flex;background:var(--primary);
  padding:0 16px 10px;gap:8px;flex-shrink:0;
}
.day-tab{
  flex:1;padding:9px 4px;border:none;border-radius:9px;
  font-size:13px;font-weight:600;cursor:pointer;
  background:rgba(255,255,255,.15);color:rgba(255,255,255,.7);
  transition:all .2s;
}
.day-tab.active{background:#fff;color:var(--primary);}

/* Schedule view */
#scheduleView{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;}

.bk-bar{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:8px 16px;display:flex;align-items:center;gap:8px;
  font-size:13px;color:var(--sub);flex-shrink:0;
}
.bk-bar strong{color:var(--text);}
.clr-btn{
  margin-left:auto;background:none;border:1px solid var(--border);
  border-radius:6px;padding:4px 10px;font-size:12px;color:var(--sub);cursor:pointer;
}

/* THE scroll container — both axes */
.sched-scroll{
  flex:1;overflow:auto;-webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
}

/* Grid */
.sched-grid{
  display:grid;
  grid-template-columns:62px repeat(5,130px);
  width:max-content;
}

/* Room header row — sticky top:0 WITHIN the scroll container */
.rhdr{
  position:sticky;top:0;
  background:var(--card);z-index:50;
  border-bottom:2px solid var(--border);
  border-right:1px solid var(--border);
  padding:10px 6px;text-align:center;
  font-size:12px;font-weight:700;line-height:1.4;
}
.rhdr.corner{
  left:0;z-index:60;background:var(--bg);
  font-size:10px;color:var(--sub);
  border-right:2px solid var(--border);
}
.rhdr.r1{color:var(--r1);border-top:3px solid var(--r1);}
.rhdr.r2{color:var(--r2);border-top:3px solid var(--r2);}
.rhdr.r3{color:var(--r3);border-top:3px solid var(--r3);}
.rhdr.r6{color:var(--r6);border-top:3px solid var(--r6);}
.rhdr.r7{color:var(--r7);border-top:3px solid var(--r7);}

/* Time label — sticky left:0 */
.tlbl{
  position:sticky;left:0;z-index:30;
  background:var(--bg);
  border-right:2px solid var(--border);
  border-bottom:1px solid var(--border);
  padding:8px 4px;font-size:10px;font-weight:600;
  color:var(--sub);text-align:center;
  display:flex;align-items:flex-start;justify-content:center;
  white-space:pre-line;min-height:76px;
}

/* Session cell */
.scell{
  border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
  padding:4px;
}
.span5{grid-column:2/7;}

/* Session card */
.scard{
  border-radius:9px;padding:8px 8px 10px;height:100%;
  cursor:pointer;position:relative;
  display:flex;flex-direction:column;gap:4px;
  min-height:68px;-webkit-user-select:none;user-select:none;
  transition:opacity .15s;
}
.scard:active{opacity:.7;}
.scard.keynote {background:#f3e8f9;border-left:3px solid var(--keynote);}
.scard.plenary {background:#e8f4ee;border-left:3px solid var(--plenary);}
.scard.special  {background:#fff8e6;border-left:3px solid #c8960c;}
.scard.p.r1{background:#eaeff9;border-left:3px solid var(--r1);}
.scard.p.r2{background:#e5f2f7;border-left:3px solid var(--r2);}
.scard.p.r3{background:#e5f5eb;border-left:3px solid var(--r3);}
.scard.p.r6{background:#f7f1e3;border-left:3px solid var(--r6);}
.scard.p.r7{background:#f7e8ec;border-left:3px solid var(--r7);}

.sbadge{font-size:10px;font-weight:700;opacity:.6;text-transform:uppercase;}
.stitle{font-size:12px;font-weight:700;line-height:1.4;flex:1;}
.ssub  {font-size:11px;color:var(--sub);line-height:1.3;}

/* Check count on card */
.ck-cnt{
  position:absolute;bottom:6px;right:6px;
  background:var(--green);color:#fff;
  border-radius:10px;font-size:10px;font-weight:700;
  padding:2px 6px;line-height:1.4;
}
/* Keynote/plenary check btn on card */
.ev-ck{
  position:absolute;top:8px;right:8px;
  width:26px;height:26px;border-radius:50%;
  border:2px solid rgba(0,0,0,.2);background:rgba(255,255,255,.8);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:2;font-size:14px;
  color:transparent;transition:all .2s;
}
.ev-ck.on{background:var(--green);border-color:var(--green);color:#fff;}

/* My schedule view */
#myView{
  display:none;flex:1;min-height:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:16px;background:var(--bg);
}
#myView.active{display:block;}

.my-day-hdr{
  font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;color:var(--sub);margin:16px 0 8px;
}
.my-day-hdr:first-child{margin-top:0;}

.my-sess{
  background:var(--card);border-radius:12px;
  margin-bottom:10px;overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.07);
}
.my-sess-hdr{
  padding:10px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.my-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.my-info{flex:1;}
.my-time{font-size:11px;color:var(--sub);}
.my-sid {font-size:13px;font-weight:700;}

.my-paper{
  display:flex;align-items:flex-start;gap:12px;
  padding:11px 14px;border-bottom:1px solid var(--border);
  cursor:pointer;-webkit-user-select:none;user-select:none;
}
.my-paper:last-child{border-bottom:none;}
.my-pck{
  flex-shrink:0;width:24px;height:24px;border-radius:50%;
  border:2px solid var(--border);background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:transparent;transition:all .2s;margin-top:1px;
}
.my-pck.on{background:var(--green);border-color:var(--green);color:#fff;}
.my-pt{flex:1;}
.my-ptitle{font-size:13px;font-weight:600;line-height:1.4;}
.my-pauth {font-size:12px;color:var(--sub);margin-top:2px;}

.empty{text-align:center;padding:60px 20px;color:var(--sub);}
.empty .icon{font-size:48px;margin-bottom:12px;}
.empty p{font-size:15px;line-height:1.6;}

/* Bottom nav */
.bot-nav{
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;padding-bottom:var(--sb);flex-shrink:0;
}
.nbtn{
  flex:1;padding:10px 4px 8px;border:none;background:transparent;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:3px;color:var(--sub);
  font-size:10px;font-weight:500;position:relative;transition:color .2s;
}
.nbtn.active{color:var(--primary);}
.nbtn svg{width:24px;height:24px;}
.nbadge{
  background:var(--accent);color:#fff;border-radius:10px;
  font-size:9px;font-weight:700;padding:1px 5px;line-height:1.4;
  position:absolute;top:5px;right:calc(50% - 22px);
}

/* Modal */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
  display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.overlay.open{opacity:1;pointer-events:all;}
.sheet{
  background:var(--card);border-radius:20px 20px 0 0;width:100%;
  max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.32,.72,0,1);
  padding-bottom:calc(20px + var(--sb));
}
.overlay.open .sheet{transform:translateY(0);}
.s-handle{width:36px;height:5px;background:var(--border);border-radius:3px;margin:12px auto 8px;}
.s-head{padding:4px 20px 14px;border-bottom:1px solid var(--border);}
.s-type{
  display:inline-block;font-size:11px;font-weight:700;
  padding:3px 8px;border-radius:4px;margin-bottom:8px;
  text-transform:uppercase;letter-spacing:.5px;
}
.s-type.keynote{background:#f3e8f9;color:var(--keynote);}
.s-type.plenary{background:#e8f4ee;color:var(--plenary);}
.s-type.p      {background:#eaeff9;color:var(--primary);}
.s-type.special{background:#fff8e6;color:#8a6000;}
.s-title{font-size:18px;font-weight:700;line-height:1.4;margin-bottom:6px;}
.s-meta{font-size:13px;color:var(--sub);}
.s-body{padding:14px 20px;}
.sec-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--sub);margin-bottom:10px;}

/* Select-all button */
.sel-all{
  width:100%;padding:10px;background:transparent;
  border:1.5px solid var(--border);border-radius:10px;
  font-size:13px;font-weight:600;color:var(--primary);
  cursor:pointer;margin-bottom:14px;transition:background .15s;
}
.sel-all:active{background:var(--bg);}

/* Paper row in modal */
.p-row{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 0;border-bottom:1px solid var(--border);
  cursor:pointer;-webkit-user-select:none;user-select:none;
}
.p-row:last-child{border-bottom:none;}
.p-ck{
  flex-shrink:0;width:28px;height:28px;border-radius:50%;
  border:2px solid var(--border);background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;color:transparent;transition:all .2s;margin-top:1px;
}
.p-ck.on{background:var(--green);border-color:var(--green);color:#fff;}
.p-info{flex:1;}
.p-title{font-size:14px;font-weight:600;line-height:1.4;margin-bottom:3px;}
.p-auth {font-size:12px;color:var(--sub);}

/* Special event check in modal */
.ev-btn{
  width:100%;padding:14px;border-radius:12px;border:none;
  font-size:15px;font-weight:600;cursor:pointer;margin-top:16px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s;
}
.ev-btn.off{background:var(--primary);color:#fff;}
.ev-btn.on {background:var(--green);color:#fff;}
</style>
</head>

<header class="app-hdr">

</header>

<div class="day-tabs">

  <button class="day-tab" onclick="switchDay(2)">Day 2 · Sun Jun 14</button>
</div>

<div id="scheduleView">
  <div class="bk-bar">
    <span>チェック: <strong id="ckCount">0</strong> 件</span>
    <button class="clr-btn" onclick="clearAll()">全解除</button>
  </div>
  <div class="sched-scroll">
    <div class="sched-grid" id="grid"></div>
  </div>
</div>

<div id="myView">
  <div id="myContent"></div>
</div>

<nav class="bot-nav">
  <button class="nbtn active" id="nb0" onclick="switchView('schedule')">

      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    スケジュール
  </button>
  <button class="nbtn" id="nb1" onclick="switchView('my')">
    <span class="nbadge" id="nbadge" style="display:none"></span>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

      <path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/>
    </svg>
    マイ予定
  </button>
</nav>

<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="sheet" id="sheet">
    <div class="s-handle"></div>
    <div class="s-head">
      <div class="s-type" id="sType"></div>
      <div class="s-title" id="sTitle"></div>
      <div class="s-meta" id="sMeta"></div>
    </div>
    <div class="s-body" id="sBody"></div>
  </div>
</div>

// ── State ─────────────────────────────────────────────────────────────────
let saved = JSON.parse(localStorage.getItem('seta2026_v2')||'{}');
// Keys: "P_S01_0" for paper, "E_D1_KEY1" for event

function save(){ localStorage.setItem('seta2026_v2', JSON.stringify(saved)); }

function isPaperOn(sid,i){ return !!saved[`P_${sid}_${i}`]; }
function isEvOn(eid)     { return !!saved[`E_${eid}`]; }
function countPapers(sid){ return (S[sid]?.papers||[]).filter((_,i)=>isPaperOn(sid,i)).length; }
function totalCount(){     return Object.values(saved).filter(Boolean).length; }

function togglePaper(sid,i){
  const k=`P_${sid}_${i}`;
  if(saved[k]) delete saved[k]; else saved[k]=true;
  save();
}
function toggleEv(eid){
  const k=`E_${eid}`;
  if(saved[k]) delete saved[k]; else saved[k]=true;
  save();
}
function clearAll(){
  saved={};save();
  renderGrid();updateUI();
}

// ── Current modal ─────────────────────────────────────────────────────────
let modalId=null, modalIsEv=false;
let currentDay=1;

// ── Render Grid ───────────────────────────────────────────────────────────
function renderGrid(){
  const g=document.getElementById('grid');
  g.innerHTML='';

  // Room header row
  const corner=el('div','rhdr corner');corner.textContent='時間';g.appendChild(corner);
  ROOMS.forEach((r,i)=>{
    const c=el('div',`rhdr ${RC[i]}`);
    c.innerHTML=r.replace(' ','<br>');
    g.appendChild(c);
  });

  SLOTS[currentDay].forEach(slot=>{
    const tl=el('div','tlbl');
    tl.textContent=slot.time.replace('–','\n–');
    g.appendChild(tl);

    if(slot.ev){
      const ev=EV[slot.ev];
      const cell=el('div','scell span5');
      cell.style.minHeight='56px';
      const card=el('div',`scard ${ev.type}`);
      card.innerHTML=`<div class="sbadge">${typeLabel(ev.type)}</div><div class="stitle">${ev.label}</div>`;
      const lines=ev.detail.split('\n');
      if(ev.type!=='special') card.innerHTML+=`<div class="ssub">${lines[0]}</div>`;
      if(ev.type==='keynote'||ev.type==='plenary'){
        const ck=el('div','ev-ck'+(isEvOn(ev.id)?' on':''));
        ck.textContent='✓';
        ck.addEventListener('click',e=>{e.stopPropagation();toggleEv(ev.id);renderGrid();updateUI();});
        card.appendChild(ck);
      }
      card.addEventListener('click',()=>openEvModal(ev.id));
      cell.appendChild(card);g.appendChild(cell);
    } else {
      slot.par.forEach((sid,i)=>{
        const cell=el('div','scell');
        if(sid){
          const s=S[sid];
          const card=el('div',`scard p ${s.rc}`);
          const cnt=countPapers(sid);
          card.innerHTML=`<div class="sbadge">${s.id}</div><div class="stitle">${s.title}</div>`;
          if(cnt>0){
            const b=el('div','ck-cnt');
            b.textContent=`✓${cnt}`;
            card.appendChild(b);
          }
          card.addEventListener('click',()=>openSessModal(sid));
          cell.appendChild(card);
        }
        g.appendChild(cell);
      });
    }
  });
}

function typeLabel(t){
  return t==='keynote'?'Keynote':t==='plenary'?'Plenary':'Special';
}
function el(tag,cls){ const e=document.createElement(tag); if(cls) e.className=cls; return e; }

// ── Modals ────────────────────────────────────────────────────────────────
function openSessModal(sid){
  modalId=sid; modalIsEv=false;
  const s=S[sid];
  document.getElementById('sType').textContent=`${s.id} · ${s.room} · ${s.time}`;
  document.getElementById('sType').className='s-type p';
  document.getElementById('sTitle').textContent=s.title;
  document.getElementById('sMeta').innerHTML=`<span>📍 ${s.room}</span>&nbsp;&nbsp;<span>🕐 ${s.time}</span>`;

  const body=document.getElementById('sBody');
  const allOn=s.papers.every((_,i)=>isPaperOn(sid,i));
  body.innerHTML=`<div class="sec-hdr">発表 (${s.papers.length}件)</div>`;

  const selAll=el('button','sel-all');
  selAll.textContent=allOn?'全選択を解除':'全て追加';
  selAll.addEventListener('click',()=>{
    s.papers.forEach((_,i)=>{
      if(allOn){delete saved[`P_${sid}_${i}`];}
      else{saved[`P_${sid}_${i}`]=true;}
    });
    save();renderGrid();updateUI();
    openSessModal(sid);
  });
  body.appendChild(selAll);

  s.papers.forEach((p,i)=>{
    const row=el('div','p-row');
    const ck=el('div','p-ck'+(isPaperOn(sid,i)?' on':''));
    ck.textContent='✓';
    const info=el('div','p-info');
    info.innerHTML=`<div class="p-title">${p.t}</div><div class="p-auth">発表者: ${p.a}</div>`;
    row.appendChild(ck);row.appendChild(info);
    row.addEventListener('click',()=>{
      togglePaper(sid,i);
      renderGrid();updateUI();
      ck.classList.toggle('on',isPaperOn(sid,i));
      const cnt=countPapers(sid);
      selAll.textContent=s.papers.every((_,j)=>isPaperOn(sid,j))?'全選択を解除':'全て追加';
    });
    body.appendChild(row);
  });
  document.getElementById('overlay').classList.add('open');
}

function openEvModal(eid){
  modalId=eid; modalIsEv=true;
  const ev=EV[eid];
  document.getElementById('sType').textContent=typeLabel(ev.type);
  document.getElementById('sType').className=`s-type ${ev.type}`;
  document.getElementById('sTitle').textContent=ev.label;
  document.getElementById('sMeta').innerHTML=`<span>🕐 ${ev.time}</span>`;

  const body=document.getElementById('sBody');
  body.innerHTML=`<div style="font-size:15px;line-height:1.8;white-space:pre-line;color:var(--text)">${ev.detail}</div>`;

  if(ev.type==='keynote'||ev.type==='plenary'){
    const btn=el('button','ev-btn '+(isEvOn(eid)?'on':'off'));
    btn.innerHTML=(isEvOn(eid)?'✓ マイ予定から削除':'＋ マイ予定に追加');
    btn.addEventListener('click',()=>{
      toggleEv(eid);renderGrid();updateUI();
      btn.className='ev-btn '+(isEvOn(eid)?'on':'off');
      btn.innerHTML=(isEvOn(eid)?'✓ マイ予定から削除':'＋ マイ予定に追加');
    });
    body.appendChild(btn);
  }
  document.getElementById('overlay').classList.add('open');
}

function handleOverlayClick(e){
  if(e.target===document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('open');
}

// ── My Schedule ───────────────────────────────────────────────────────────
function renderMySchedule(){
  const c=document.getElementById('myContent');
  if(totalCount()===0){
    c.innerHTML=`<div class="empty"><div class="icon">📋</div><p>セッションをタップして<br>発表をチェックしましょう</p></div>`;
    return;
  }

  // Gather checked papers & events by day
  const days={1:[],2:[]};

  // Events
  Object.keys(saved).filter(k=>k.startsWith('E_')&&saved[k]).forEach(k=>{
    const eid=k.slice(2);
    const ev=EV[eid];
    if(ev) days[ev.day].push({kind:'ev',ev});
  });

  // Papers grouped by session
  const sessMap={};
  Object.keys(saved).filter(k=>k.startsWith('P_')&&saved[k]).forEach(k=>{
    const parts=k.slice(2).split('_');
    const sid=parts.slice(0,2).join('_');
    const idx=parseInt(parts[2]);
    if(!sessMap[sid]) sessMap[sid]=[];
    sessMap[sid].push(idx);
  });
  Object.entries(sessMap).forEach(([sid,idxs])=>{
    const s=S[sid];
    if(s) days[s.day].push({kind:'sess',sid,idxs:idxs.sort((a,b)=>a-b)});
  });

  // Sort each day by time
  const tNum=t=>{ const m=t.match(/(\d+):(\d+)/); return m?+m[1]*60+ +m[2]:0; };
  [1,2].forEach(d=>days[d].sort((a,b)=>{
    const ta=a.kind==='ev'?a.ev.time:S[a.sid].time;
    const tb=b.kind==='ev'?b.ev.time:S[b.sid].time;
    return tNum(ta)-tNum(tb);
  }));

  const roomColor={'Room 1':'var(--r1)','Room 2':'var(--r2)','Room 3':'var(--r3)','Room 6':'var(--r6)','Room 7':'var(--r7)'};
  let html='';

  [1,2].forEach(d=>{
    if(!days[d].length) return;
    html+=`<div class="my-day-hdr">Day ${d} · ${d===1?'6月13日（土）':'6月14日（日）'}</div>`;
    days[d].forEach(item=>{
      if(item.kind==='ev'){
        const ev=item.ev;
        html+=`<div class="my-sess">
          <div class="my-sess-hdr" onclick="openEvModal('${ev.id}');switchView('schedule')">
            <div class="my-dot" style="background:${ev.type==='keynote'?'var(--keynote)':'var(--plenary)'}"></div>
            <div class="my-info">
              <div class="my-time">🕐 ${ev.time}</div>
              <div class="my-sid">${ev.label}</div>
            </div>
          </div>
        </div>`;
      } else {
        const s=S[item.sid];
        const col=roomColor[s.room]||'var(--primary)';
        html+=`<div class="my-sess">
          <div class="my-sess-hdr" onclick="openSessModal('${s.id}')">
            <div class="my-dot" style="background:${col}"></div>
            <div class="my-info">
              <div class="my-time">🕐 ${s.time} · ${s.room}</div>
              <div class="my-sid">${s.id}: ${s.title}</div>
            </div>
          </div>`;
        item.idxs.forEach(i=>{
          const p=s.papers[i];
          html+=`<div class="my-paper" data-sid="${s.id}" data-i="${i}">
            <div class="my-pck on">✓</div>
            <div class="my-pt">
              <div class="my-ptitle">${p.t}</div>
              <div class="my-pauth">${p.a}</div>
            </div>
          </div>`;
        });
        html+='</div>';
      }
    });
  });
  c.innerHTML=html;

  // Bind paper toggle in my schedule
  c.querySelectorAll('.my-paper').forEach(row=>{
    row.addEventListener('click',()=>{
      const sid=row.dataset.sid, i=+row.dataset.i;
      togglePaper(sid,i);
      renderGrid();updateUI();
      renderMySchedule();
    });
  });
}

// ── UI helpers ────────────────────────────────────────────────────────────
function updateUI(){
  const n=totalCount();
  document.getElementById('ckCount').textContent=n;
  const b=document.getElementById('nbadge');
  b.textContent=n; b.style.display=n?'block':'none';
}

function switchDay(d){
  currentDay=d;
  document.querySelectorAll('.day-tab').forEach((t,i)=>t.classList.toggle('active',i+1===d));
  renderGrid();
}

function switchView(v){
  const isSched=v==='schedule';
  document.getElementById('scheduleView').style.display=isSched?'flex':'none';
  document.getElementById('myView').classList.toggle('active',!isSched);
  document.getElementById('nb0').classList.toggle('active',isSched);
  document.getElementById('nb1').classList.toggle('active',!isSched);
  if(!isSched) renderMySchedule();
}

// ── Init ──────────────────────────────────────────────────────────────────
renderGrid();
updateUI();
